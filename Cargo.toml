[package]
edition = "2024"
name = "mana-tui"
version = "0.0.1"
license = "MIT"

[features]
macros = [
    "dep:bon",
    "dep:mana-tui-macros",
]
nightly = ["mana-tui-elemental/nightly"]

[dependencies]
mana-tui-beheaded.workspace = true
mana-tui-utils.workspace = true

[dependencies.bon]
workspace = true
optional = true

[dependencies.mana-tui-elemental]
workspace = true

[dependencies.mana-tui-macros]
workspace = true
optional = true

[dependencies.ratatui]
workspace = true

[dev-dependencies]
bon = "3.8.1"

[dev-dependencies.hecs]
workspace = true

[dev-dependencies.mana-tui-elemental]
workspace = true

[dev-dependencies.mana-tui-macros]
workspace = true

[dev-dependencies.ratatui]
workspace = true

[workspace]
members = [
    "mana-tui-elemental",
    "mana-tui-macros",
    "examples/todo-app",
    "mana-tui-beheaded",
    "mana-tui-utils",
    "mana-tui-potion",
]
resolver = "3"

[workspace.dependencies]
ratatui = "0.30.0"
tracing = "0.1.44"
bon = "3.8.1"
tracing-subscriber = "0.3.22"

[workspace.dependencies.derive_more]
version = "2.1.0"
features = ["full"]

[workspace.dependencies.hecs]
version = "0.11.0"
git = "https://github.com/Ralith/hecs.git"
features = ["macros"]

[workspace.dependencies.mana-tui-elemental]
path = "./mana-tui-elemental"

[workspace.dependencies.mana-tui-macros]
path = "./mana-tui-macros"

[workspace.dependencies.mx-core]
path = "./mx/mx-core"

[workspace.dependencies.mana-tui-beheaded]
path = "./mana-tui-beheaded"

[workspace.dependencies.mana-tui-utils]
path = "./mana-tui-utils"

[workspace.lints.clippy]
pedantic = "warn"
